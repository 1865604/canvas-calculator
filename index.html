<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Fluent Calculator</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #0f172a, #1e293b); 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas { 
            box-shadow: 0 25px 50px rgba(0,0,0,0.4); 
            border-radius: 24px; 
            background: #111827;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<canvas id="calcCanvas" width="340" height="520"></canvas>

<script>
const canvas = document.getElementById('calcCanvas');
const ctx = canvas.getContext('2d');

// 高解像度ディスプレイ（Retinaなど）対応
const dpr = window.devicePixelRatio || 1;
canvas.width = 340 * dpr;
canvas.height = 520 * dpr;
canvas.style.width = '340px';
canvas.style.height = '520px';
ctx.scale(dpr, dpr);

let displayValue = '0';
let currentInput = '';
let activeKey = null;

// --- 【変更】背景画像に電子回路のイメージを設定 ---
const bgImage = new Image();
bgImage.src = 'https://unsplash.com'; 

const logoImage = new Image();
// 任意のロゴ画像のURLに置き換えてください（透過PNG推奨）
logoImage.src = 'https://picsum.photos'; 

// 画像が読み込まれたら再描画する
let imagesLoaded = 0;
function onImageLoad() {
    imagesLoaded++;
    if (imagesLoaded >= 2) {
        draw();
    }
}
bgImage.onload = onImageLoad;
logoImage.onload = onImageLoad;
bgImage.onerror = () => { imagesLoaded++; draw(); };
logoImage.onerror = () => { imagesLoaded++; draw(); };

const buttons = [
    ['C', '(', ')', '/'],
    ['7', '8', '9', '*'],
    ['4', '5', '6', '-'],
    ['1', '2', '3', '+'],
    ['+/-', '0', '.', '=']
];

const cols = 4;
const rows = 5;
const padding = 12; 
const topOffset = 140; 
const btnWidth = (340 - (padding * (cols + 1))) / cols;
const btnHeight = (520 - topOffset - (padding * (rows + 1))) / rows;

function drawRoundRect(x, y, w, h, r, fillColor, strokeColor = null) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, r); ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill();
    if (strokeColor) {
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

function draw() {
    ctx.clearRect(0, 0, 340, 520);

    // 1. 電卓全体のクリッピングと電子回路背景の描画
    ctx.save();
    ctx.beginPath();
    const r = 24;
    ctx.moveTo(r, 0); ctx.lineTo(340-r, 0); ctx.quadraticCurveTo(340, 0, 340, r);
    ctx.lineTo(340, 520-r); ctx.quadraticCurveTo(340, 520, 340-r, 520);
    ctx.lineTo(r, 520); ctx.quadraticCurveTo(0, 520, 0, 520-r);
    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.clip();

    if (bgImage.complete && bgImage.naturalWidth !== 0) {
        ctx.drawImage(bgImage, 0, 0, 340, 520);
        // 背景を少し暗くして文字を見えやすくするオーバーレイ
        ctx.fillStyle = 'rgba(15, 23, 42, 0.4)';
        ctx.fillRect(0, 0, 340, 520);
    } else {
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(0, 0, 340, 520);
    }
    ctx.restore();

    // 2. ロゴの描画
    if (logoImage.complete && logoImage.naturalWidth !== 0) {
        ctx.drawImage(logoImage, 24, 24, 26, 26);
    } else {
        // 画像が無い場合の近未来風テキストロゴ
        ctx.fillStyle = '#38bdf8'; // サイバーブルー
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('SYS.CALC_//', 24, 42);
    }

    // 3. ディスプレイ領域（サイバーテイストに合わせて白から黒系の透過に変更）
    ctx.fillStyle = 'rgba(15, 23, 42, 0.6)';
    ctx.fillRect(0, 0, 340, topOffset);
    
    // 計算式の履歴
    ctx.fillStyle = '#94a3b8';
    ctx.font = '16px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(currentInput || ' ', 340 - 24, 50);

    // メイン数値
    ctx.fillStyle = '#f8fafc';
    ctx.font = 'bold 44px sans-serif';
    ctx.textAlign = 'right';
    if (displayValue.length > 10) ctx.font = 'bold 28px sans-serif';
    ctx.fillText(displayValue, 340 - 24, 105);

    // 4. ボタンの描画（回路が綺麗に透けるダークグラスモーフィズム風）
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const btnText = buttons[r][c];
            const x = padding + c * (btnWidth + padding);
            const y = topOffset + padding + r * (btnHeight + padding);

            const isHovered = (activeKey && activeKey.r === r && activeKey.c === c);
            
            // 電子回路に映える半透明ダークカラー
            let bg = isHovered ? 'rgba(255, 255, 255, 0.25)' : 'rgba(255, 255, 255, 0.12)'; 
            let textColor = '#f1f5f9';
            let border = 'rgba(255, 255, 255, 0.15)';
            
            if (['/', '*', '-', '+', '='].includes(btnText)) {
                // 演算子はネオンブルー
                bg = isHovered ? 'rgba(14, 165, 233, 0.9)' : 'rgba(2, 132, 199, 0.7)';
                textColor = '#ffffff';
                border = 'rgba(56, 189, 248, 0.5)';
            } else if (['C', '(', ')', '+/-'].includes(btnText)) {
                // 機能ボタンは暗めの透過
                bg = isHovered ? 'rgba(74, 85, 104, 0.7)' : 'rgba(30, 41, 59, 0.6)';
                textColor = '#cbd5e1';
                border = 'rgba(255, 255, 255, 0.1)';
            }

            drawRoundRect(x, y, btnWidth, btnHeight, 16, bg, border);

            ctx.fillStyle = textColor;
            ctx.font = ['/', '*', '-', '+', '='].includes(btnText) ? 'bold 22px sans-serif' : '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(btnText, x + btnWidth / 2, y + btnHeight / 2);
        }
    }
}

function getButtonFromCoords(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) * (340 / rect.width);
    const y = (clientY - rect.top) * (520 / rect.height);

    if (y < topOffset) return null;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const bx = padding + c * (btnWidth + padding);
            const by = topOffset + padding + r * (btnHeight + padding);
            if (x >= bx && x <= bx + btnWidth && y >= by && y <= by + btnHeight) {
                return { r, c, text: buttons[r][c] };
            }
        }
    }
    return null;
}

function handleStart(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const btn = getButtonFromCoords(clientX, clientY);
    if (btn) {
        activeKey = btn;
        draw();
    }
}

function handleEnd(e) {
    if (activeKey) {
        handleInput(activeKey.text);
        activeKey = null;
        draw();
    }
}

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); handleEnd(e); });

function handleInput(key) {
    if (key === 'C') {
        currentInput = '';
        displayValue = '0';
    } else if (key === '=') {
        try {
            if (currentInput) {
                let sanitized = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
                let result = eval(sanitized);
                displayValue = Number(result).toString();
                currentInput = displayValue;
            }
        } catch (error) {
            displayValue = 'Error';
            currentInput = '';
        }
    } else if (key === '+/-') {
        if (displayValue !== '0') {
            displayValue = displayValue.startsWith('-') ? displayValue.slice(1) : '-' + displayValue;
            currentInput = displayValue;
        }
    } else {
        if (displayValue === '0' && !['/', '*', '-', '+'].includes(key)) {
            currentInput = key;
        } else {
            currentInput += key;
        }
        displayValue = currentInput;
    }
}

draw();
</script>
</body>
</html>

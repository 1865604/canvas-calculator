<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Fluent Calculator</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #e0eafc, #cfdef3); 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas { 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            border-radius: 24px; 
            background: #ffffff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<canvas id="calcCanvas" width="340" height="520"></canvas>

<script>
const canvas = document.getElementById('calcCanvas');
const ctx = canvas.getContext('2d');

// 高解像度ディスプレイ（Retinaなど）対応
const dpr = window.devicePixelRatio || 1;
canvas.width = 340 * dpr;
canvas.height = 520 * dpr;
canvas.style.width = '340px';
canvas.style.height = '520px';
ctx.scale(dpr, dpr);

let displayValue = '0';
let currentInput = '';
let activeKey = null; // タッチ中のボタン

// Windows/Google風のモダンな配列
const buttons = [
    ['C', '(', ')', '/'],
    ['7', '8', '9', '*'],
    ['4', '5', '6', '-'],
    ['1', '2', '3', '+'],
    ['+/-', '0', '.', '=']
];

const cols = 4;
const rows = 5;
const padding = 12; 
const topOffset = 140; // ディスプレイ領域を広く
const btnWidth = (340 - (padding * (cols + 1))) / cols;
const btnHeight = (520 - topOffset - (padding * (rows + 1))) / rows;

// 角丸四角形を描画するヘルパー関数
function drawRoundRect(x, y, w, h, r, fillColor, strokeColor = null) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill();
    if (strokeColor) {
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

// 画面全体の描画
function draw() {
    ctx.clearRect(0, 0, 340, 520);

    // 1. 背景の描画（Windowsのグラスモーフィズム風）
    drawRoundRect(0, 0, 340, 520, 24, '#f3f3f3');

    // 2. ディスプレイ領域
    ctx.fillStyle = '#f3f3f3';
    ctx.fillRect(0, 0, 340, topOffset);
    
    // 計算式の履歴（小さく表示）
    ctx.fillStyle = '#5f6368';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(currentInput || ' ', 340 - 24, 50);

    // メイン数値（Google風の太文字とゆったりした配置）
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 44px sans-serif';
    ctx.textAlign = 'right';
    // 文字が長すぎる場合はサイズを小さくする
    if (displayValue.length > 10) ctx.font = 'bold 28px sans-serif';
    ctx.fillText(displayValue, 340 - 24, 105);

    // 3. ボタンの描画
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const btnText = buttons[r][c];
            const x = padding + c * (btnWidth + padding);
            const y = topOffset + padding + r * (btnHeight + padding);

            const isHovered = (activeKey && activeKey.r === r && activeKey.c === c);
            
            // 色の定義（Google / Windows11を意識した配色）
            let bg = '#ffffff'; // 基本は白
            let textColor = '#1a1a1a';
            
            if (['/', '*', '-', '+', '='].includes(btnText)) {
                // 記号・イコールはアクセントカラー（Googleブルー）
                bg = isHovered ? '#1557b0' : '#1a73e8';
                textColor = '#ffffff';
            } else if (['C', '(', ')', '+/-'].includes(btnText)) {
                // 機能ボタンは薄いグレー
                bg = isHovered ? '#dcdcdc' : '#f1f3f4';
                textColor = '#3c4043';
            } else {
                // 数字ボタンのホバー
                if (isHovered) bg = '#f8f9fa';
            }

            // ボタン本体の描画（滑らかな角丸）
            drawRoundRect(x, y, btnWidth, btnHeight, 16, bg);

            // ボタンの文字
            ctx.fillStyle = textColor;
            ctx.font = ['/', '*', '-', '+', '='].includes(btnText) ? 'bold 22px sans-serif' : '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(btnText, x + btnWidth / 2, y + btnHeight / 2);
        }
    }
}

// 座標からどのボタンが押されたか判定する関数
function getButtonFromCoords(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) * (340 / rect.width);
    const y = (clientY - rect.top) * (520 / rect.height);

    if (y < topOffset) return null;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const bx = padding + c * (btnWidth + padding);
            const by = topOffset + padding + r * (btnHeight + padding);
            if (x >= bx && x <= bx + btnWidth && y >= by && y <= by + btnHeight) {
                return { r, c, text: buttons[r][c] };
            }
        }
    }
    return null;
}

// 押し心地を出すためのイベント（マウス＆スマホ両対応）
function handleStart(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const btn = getButtonFromCoords(clientX, clientY);
    if (btn) {
        activeKey = btn;
        draw();
    }
}

function handleEnd(e) {
    if (activeKey) {
        handleInput(activeKey.text);
        activeKey = null;
        draw();
    }
}

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); handleEnd(e); });

// 計算ロジック
function handleInput(key) {
    if (key === 'C') {
        currentInput = '';
        displayValue = '0';
    } else if (key === '=') {
        try {
            if (currentInput) {
                // 安全な計算のために基本的な記号のみ許可して評価
                let sanitized = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
                let result = eval(sanitized);
                displayValue = Number(result).toString();
                currentInput = displayValue;
            }
        } catch (error) {
            displayValue = 'Error';
            currentInput = '';
        }
    } else if (key === '+/-') {
        if (displayValue !== '0') {
            displayValue = displayValue.startsWith('-') ? displayValue.slice(1) : '-' + displayValue;
            currentInput = displayValue;
        }
    } else {
        if (displayValue === '0' && !['/', '*', '-', '+'].includes(key)) {
            currentInput = key;
        } else {
            currentInput += key;
        }
        displayValue = currentInput;
    }
}

// 初回描画
draw();
</script>
</body>
</html>
